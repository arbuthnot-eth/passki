<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>.SKI</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <section class="stage-card">
      <div class="stage-top">
        <h1>.SKI Wallet</h1>
        <p>One-button wallet sign-in with device identity.</p>
      </div>

      <div class="demo-stage">
        <div class="wallet-widget has-black-diamond" id="wallet-widget">
          <div id="wk-widget"></div>

          <button class="wallet-profile-btn" id="wallet-profile-btn" title="Open wallet menu" aria-label="Open wallet menu" style="display:none">
            <img
              class="wallet-profile-logo"
              src="./assets/black_dotskitxt.png"
              alt=".SKI"
              draggable="false"
            >
          </button>

          <div id="wallet-menu-root"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="wk-modal"></div>

  <script type="module" src="./dist/ski.js"></script>
</body>
</html>
