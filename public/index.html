  <script type="module" src="./dist/ski.js?v=20260330p"></script>
  <script>
    (function() {
      var addrs = {
        btc: { full: 'bc1qtxapc28p93g54gpv5jjllh2tk7axr9lrm7hw23', color: '#f7931a', bg: '#2a1a00' },
        sol: { full: 'FtdgskzfMMZ87cZR1Qv5mxFSJJVgNp9kh7v59bp6L9dh', color: '#9945FF', bg: '#1a0a2e' },
        sui: { full: '0x3ca0da71d19d9a1837ad3da155f03aab776aa33963864064eb81569f10e5222b', color: '#4da2ff', bg: '#0a1a2e' }
      };
      var addrEl = document.getElementById('ski-demo-addr');
      var qrCanvas = document.getElementById('ski-demo-qr');
      var currentNet = 'sol';

      var netLogoUrls = {
        btc: './assets/btc-icon.svg',
        sol: './assets/sol-icon.svg',
        sui: './assets/sui-icon.svg'
      };
      var netLogoCache = {};
      function getLogoImg(net, cb) {
        if (netLogoCache[net]) { cb(netLogoCache[net]); return; }
        var img = new Image();
        img.onload = function() { netLogoCache[net] = img; cb(img); };
        img.src = netLogoUrls[net];
      }

      function drawQR(canvas, text, fgColor, net) {
        var size = 120;
        canvas.width = size;
        canvas.height = size;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, size, size);
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js';
        s.onload = function() {
          var qr = qrcode(0, 'L');
          qr.addData(text);
          qr.make();
          var modules = qr.getModuleCount();
          var pad = 6;
          var cellSize = (size - pad * 2) / modules;
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, size, size);
          // Draw QR modules, skip center area for logo
          var cx = size / 2, cy = size / 2, logoR = 16;
          ctx.fillStyle = fgColor;
          for (var r = 0; r < modules; r++) {
            for (var c = 0; c < modules; c++) {
              if (qr.isDark(r, c)) {
                var px = pad + c * cellSize + cellSize/2;
                var py = pad + r * cellSize + cellSize/2;
                var dist = Math.sqrt((px-cx)*(px-cx) + (py-cy)*(py-cy));
                if (dist > logoR + 2) {
                  ctx.fillRect(pad + c * cellSize, pad + r * cellSize, cellSize + 0.5, cellSize + 0.5);
                }
              }
            }
          }
          // Draw logo in center
          ctx.beginPath(); ctx.arc(cx, cy, logoR + 2, 0, Math.PI*2); ctx.fillStyle = '#ffffff'; ctx.fill();
          getLogoImg(net, function(img) {
            var d = logoR * 2;
            ctx.drawImage(img, cx - logoR, cy - logoR, d, d);
          });
        };
        if (window.qrcode) { s.onload(); } else { document.head.appendChild(s); }
      }

      function truncAddr(addr) {
        if (addr.length <= 16) return addr;
        return addr.slice(0, 6) + '...' + addr.slice(-5);
      }

      function updateAddr(net) {
        currentNet = net;
        var a = addrs[net];
        addrEl.textContent = truncAddr(a.full);
        addrEl.title = a.full;
        addrEl.dataset.full = a.full;
        addrEl.dataset.short = truncAddr(a.full);
        addrEl.className = 'ski-demo-addr ski-demo-addr--' + net;
        drawQR(qrCanvas, a.full, a.color, net);
        var demo = document.getElementById('ski-demo');
        demo.className = demo.classList.contains('open') ? 'ski-demo open ski-demo--' + net : 'ski-demo ski-demo--' + net;
      }

      // Card click opens/closes video
      document.getElementById('ski-demo-card').addEventListener('click', function(e) {
        if (e.target.closest('.ski-demo-net') || e.target.closest('.ski-demo-addr') || e.target.closest('.ski-demo-qr')) return;
        var demo = document.getElementById('ski-demo');
        var video = demo.querySelector('video');
        demo.classList.toggle('open');
        if (demo.classList.contains('open')) { video.volume = 0.07; video.muted = false; video.play(); setTimeout(function(){ window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}); }, 100); }
        else { video.pause(); video.muted = true; }
      });

      // Network buttons switch address + QR
      document.querySelectorAll('.ski-demo-net').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          document.querySelectorAll('.ski-demo-net').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          updateAddr(btn.dataset.net);
        });
      });

      // Click address to copy
      addrEl.addEventListener('click', function(e) {
        e.stopPropagation();
        navigator.clipboard.writeText(addrEl.dataset.full || addrEl.title).then(function() {
          var orig = addrEl.textContent;
          addrEl.textContent = '\u2713 Copied';
          setTimeout(function() { addrEl.textContent = orig; }, 1000);
        });
      });

      // QR click cycles network
      var netOrder = ['btc', 'sol', 'sui'];
      qrCanvas.addEventListener('click', function(e) {
        e.stopPropagation();
        var idx = (netOrder.indexOf(currentNet) + 1) % netOrder.length;
        var next = netOrder[idx];
        document.querySelectorAll('.ski-demo-net').forEach(function(b) { b.classList.remove('active'); });
        document.querySelector('.ski-demo-net--' + next).classList.add('active');
        updateAddr(next);
      });

      // QR click cycles network
      var netOrder = ['btc', 'sol', 'sui'];
      qrCanvas.addEventListener('click', function(e) {
        e.stopPropagation();
        var idx = (netOrder.indexOf(currentNet) + 1) % netOrder.length;
        var next = netOrder[idx];
        document.querySelectorAll('.ski-demo-net').forEach(function(b) { b.classList.remove('active'); });
        document.querySelector('.ski-demo-net--' + next).classList.add('active');
        updateAddr(next);
      });

      // Lock portrait orientation in fullscreen
      var video = document.querySelector('.ski-demo-player video');
      video.addEventListener('fullscreenchange', function() {
        if (document.fullscreenElement === video) {
          try { screen.orientation.lock('portrait').catch(function(){}); } catch(e) {}
        }
      });
      video.addEventListener('webkitfullscreenchange', function() {
        if (document.webkitFullscreenElement === video) {
          try { screen.orientation.lock('portrait').catch(function(){}); } catch(e) {}
        }
      });

      // Auto-switch networks at video timestamps
      var lastSwitch = '';
      video.addEventListener('timeupdate', function() {
        var t = video.currentTime;
        var target = t >= 76 ? 'sol' : t >= 72 ? 'sui' : t >= 69 ? 'btc' : t >= 60 ? 'sol' : null;
        if (target && target !== lastSwitch) {
          lastSwitch = target;
          document.querySelectorAll('.ski-demo-net').forEach(function(b) { b.classList.remove('active'); });
          document.querySelector('.ski-demo-net--' + target).classList.add('active');
          updateAddr(target);
        }
        if (t < 60) lastSwitch = '';
      });

      // Gear toggle for extra chips
      document.getElementById('ski-demo-gear').addEventListener('click', function() {
        document.getElementById('ski-demo-chips-extra').classList.toggle('show');
      });

      // SUIAMI button — sign proof if connected, else open GitHub
      document.getElementById('ski-demo-suiami').addEventListener('click', function() {
        window.dispatchEvent(new CustomEvent('ski:request-suiami', {
          detail: { network: currentNet }
        }));
      });

      // Initial QR
      drawQR(qrCanvas, addrs.sol.full, addrs.sol.color, 'sol');
    })();
  </script>
