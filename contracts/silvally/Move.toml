[package]
name = "silvally"
edition = "2024.beta"
version = "0.0.1"

# De-risking spike: local IKA shim declares just the DWalletCap +
# approve_message surface we need, with `published-at` pointing at the
# real IKA mainnet package. This lets the spike module compile without
# pulling private IKA source. At publish time we'll verify the shim
# bytecode layout matches the real package (if not, we'll regenerate
# the shim from disassembled on-chain bytecode).

[dependencies]
ika_dwallet_2pc_mpc = { local = "./ika_shim" }

[addresses]
ski = "0x0"

[environments]
mainnet = { chain-id = "35834a8a" }
testnet = { chain-id = "4c78adac" }
